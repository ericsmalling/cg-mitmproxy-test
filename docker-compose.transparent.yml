# Transparent proxy mode: clients share the proxy's network namespace via
# network_mode: "service:proxy". iptables OUTPUT rules intercept their outbound
# traffic without any HTTPS_PROXY env var on the client side.

services:
  proxy:
    build: ./proxy
    cap_add:
      - NET_ADMIN
    ports:
      - "8081:8081"
    volumes:
      - certs:/certs
    env_file:
      - .env
    entrypoint: ["/app/entrypoint-transparent.sh"]
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /certs/mitmproxy-ca.pem"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s

  node-client:
    build: ./clients/node
    profiles: ["test"]
    network_mode: "service:proxy"
    volumes:
      - certs:/certs:ro
      - ./cache/npm:/root/.npm
    environment:
      - NODE_EXTRA_CA_CERTS=/certs/mitmproxy-ca.pem

volumes:
  certs:
